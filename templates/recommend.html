
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommendations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:
            linear-gradient(
                    135deg,
                    #0f172a,
                    #1e293b,
                    #111827);
            color:white;
            min-height:100vh;
        }

        /* NAVBAR */

        .navbar{
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(15px);
            border-bottom:1px solid rgba(255,255,255,.08);
        }

        .navbar-brand{
            font-weight:700;
            font-size:28px;
            color:white !important;
        }

        .nav-link{
            color:white !important;
        }

        .nav-link:hover{
            color:#00ffd5 !important;
        }

        /* HEADER */

        .hero{
            margin-top:60px;
            text-align:center;
        }

        .hero h1{
            font-size:55px;
            font-weight:700;
        }

        .hero p{
            color:#94a3b8;
            font-size:18px;
        }

        /* SEARCH */

        .search-box{
            max-width:700px;
            margin:50px auto;
        }

        .form-control{
            background:#1e293b;
            border:none;
            color:white;
            border-radius:50px;
            padding:18px 25px;
            font-size:18px;
        }

        .form-control:focus{
            background:#1e293b;
            color:white;
            box-shadow:0 0 30px rgba(0,255,204,.4);
        }

        .btn-success{
            border-radius:50px;
            padding:15px 40px;
            font-size:18px;
            margin-top:25px;
        }

        /* CARD */

        .card{
            background:rgba(255,255,255,.05);
            border:1px solid rgba(255,255,255,.08);
            backdrop-filter:blur(20px);
            border-radius:25px;
            overflow:hidden;
            transition:.4s;
        }

        .card:hover{
            transform:translateY(-10px);
            box-shadow:
                    0 10px 30px rgba(0,255,204,.2);
        }

        .card-img-top{
            height:320px;
            object-fit:cover;
        }

        .card-body h3{
            color:#00ffd5;
            font-size:18px;
            font-weight:600;
        }

        .card-body h5{
            color:#cbd5e1;
            font-size:14px;
        }

        footer{
            margin-top:70px;
            padding:30px;
            text-align:center;
            color:#94a3b8;
        }

        @media(max-width:768px){

            .hero h1{
                font-size:38px;
            }

            .card-img-top{
                height:250px;
            }

        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            📚 My Book Recommender
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/recommend">
                        Recommend
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>


<div class="container">

    <div class="hero">

        <h1>
            📖 Discover Similar Books
        </h1>

        <p>
            Enter your favorite book and get personalized recommendations
        </p>

    </div>


    <div class="search-box">

        <form action="/recommend_books" method="post">

            <input
                    type="text"
                    name="user_input"
                    class="form-control"
                    placeholder="🔍 Enter a book name..."
                    required>

            <div class="text-center">

                <button
                        class="btn btn-success">

                    ✨ Recommend Books

                </button>

            </div>

        </form>

    </div>


    {% if error %}

    <div class="alert alert-danger text-center">

        {{ error }}

    </div>

    {% endif %}


    <div class="row">

        {% if data %}

        {% for i in data %}

        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-6 mb-4">

            <div class="card">

                <img
                        src="{{ i[2] }}"
                        class="card-img-top">

                <div class="card-body">

                    <h3>

                        {{ i[0] }}

                    </h3>

                    <h5>

                        ✍️ {{ i[1] }}

                    </h5>

                </div>

            </div>

        </div>

        {% endfor %}

        {% endif %}

    </div>

</div>


<footer>

    Made with ❤️ using Flask

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
