<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Recommendation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: 'Poppins', sans-serif;
    }

    .navbar {
      background-color: #00a65a;
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-weight: 600;
      font-size: 1.5rem;
      color: white;
    }

    .nav-link {
      color: white;
      margin-left: 20px;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #ffd700;
    }

    h1 {
      margin-top: 30px;
      font-weight: 600;
      text-align: center;
      color: #00ffcc;
    }

    .form-control-lg {
      background-color: #1e1e1e;
      border: 2px solid #00ffcc;
      color: white;
      border-radius: 10px;
      padding: 15px;
    }

    .form-control-lg::placeholder {
      color: #cccccc;
    }

    .btn-warning {
      background-color: #00a65a;
      border: none;
      color: white;
      padding: 10px 30px;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    .btn-warning:hover {
      background-color: #00914f;
    }

    .card {
      background-color: #1e1e1e;
      border: none;
      border-radius: 15px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      margin-bottom: 30px;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 20px rgba(0, 166, 90, 0.4);
    }

    .card-img-top {
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      height: 250px;
      object-fit: cover;
    }

    .card-body h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #00ffcc;
    }

    .card-body h4 {
      font-size: 0.9rem;
      color: #cccccc;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="#">📚 My Book Recommender</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/recommend">Recommend</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <h1>📖 Recommend Books</h1>
    <div class="row justify-content-center my-4">
      <div class="col-md-8">
        <form action="/recommend_books" method="post">
          <input type="text" name="user_input" class="form-control form-control-lg" placeholder="Type a book you like..."><br>
          <div class="text-center">
            <input type="submit" class="btn btn-warning btn-lg" value="Recommend">
          </div>
        </form>
      </div>
    </div>

    <div class="row">
      {% if data %}
        {% for i in data %}
        <div class="col-md-3">
          <div class="card">
            <img class="card-img-top" src="{{ i[2] }}" alt="Book Cover">
            <div class="card-body">
              <h2>{{ i[0] }}</h2>
              <h4>{{ i[1] }}</h4>
            </div>
          </div>
        </div>
        {% endfor %}
      {% endif %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
