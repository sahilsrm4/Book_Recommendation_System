<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Recommendation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      background-color: #121212;
      color: #f1f1f1;
      font-family: 'Poppins', sans-serif;
    }

    .navbar {
      background-color: #00a65a;
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-weight: 600;
      font-size: 1.5rem;
      color: white;
    }

    .nav-link {
      color: white;
      margin-left: 20px;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #ffd700;
    }

    h1 {
      margin-top: 20px;
      font-weight: 600;
      text-align: center;
    }

    .card {
      background-color: #1e1e1e;
      border: none;
      border-radius: 15px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      margin-bottom: 30px;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 16px rgba(0, 166, 90, 0.4);
    }

    .card-img-top {
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      max-height: 250px;
      object-fit: cover;
    }

    .card-body h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #00ffcc;
    }

    .card-body h4 {
      font-size: 0.9rem;
      color: #cccccc;
    }

    .search-bar {
      margin: 2rem auto;
      max-width: 400px;
    }

    .search-bar input {
      border-radius: 25px;
      padding: 10px 20px;
      border: none;
      width: 100%;
      outline: none;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="#">📚 My Book Recommender</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/recommend">Recommend</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="container text-center">
    <h1>🌟 Top 50 Books</h1>
    
    <!-- Search Placeholder -->
    <div class="search-bar">
      <input type="text" placeholder="Search books, authors..." disabled>
    </div>

    <div class="row">
      {% for i in range(book_name|length)%}
      <div class="col-md-3">
        <div class="card">
          <img class="card-img-top" src="{{ image[i] }}" alt="Book Cover">
          <div class="card-body">
            <h2>{{ book_name[i] }}</h2>
            <h4>by {{ author[i] }}</h4>
            <h4>Votes: {{ votes[i] }}</h4>
            <h4>Rating: ⭐ {{ rating[i] }}</h4>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
